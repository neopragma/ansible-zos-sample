[tool.pytest.ini_options]
addopts = [
    "--cov=racf",
    "--cov-report=term-missing",
]

pythonpath = [
    ".",
]

testpaths = [
    "tests",
]

[tool.coverage.run]
source = [
    "racf",
]

omit = [
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
