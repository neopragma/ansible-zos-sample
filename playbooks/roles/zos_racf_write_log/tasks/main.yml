- name: Write to local RACF audit log
  vars:
    level_map:
      info: 1
      warning: 2
      error: 3
  lineinfile:
    path: "{{ racf_audit_log }}"
    line: >-
      {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
      {{ severity | upper }}:
      {{ message }}
    create: true
  delegate_to: localhost
  when:
    - message | default("") | trim != ""
    - level_map[severity] >= level_map[racf_log_level]
